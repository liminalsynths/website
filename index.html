<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>liminalsynths</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
                @font-face{
            font-family: "NeueMetanaNext";
            src: url("NeueMetanaNext-SemiBold.otf") format("opentype");
            font-weight: 600;
            font-style: normal;
        }
        
        body {
            margin: 0;
            font-family: 'NeueMetanaNext', sans-serif;
            background-color: white;
            overflow: hidden; /* 防止捲動，確保像簡報 */
        }
        :root{
            --back-arrow-y-mobile: 73dvh;
        }
        html, body { width: 100%; height: 100%; min-height: 100dvh; }

        /* Minimal utility classes (Tailwind-like) */
        .w-full{ width:100%; }
        .h-full{ height:100%; }
        .flex{ display:flex; }
        .items-center{ align-items:center; }
        .justify-center{ justify-content:center; }
        .text-center{ text-align:center; }
        .text-left{ text-align:left; }
        .text-xl{ font-size: 1.25rem; line-height: 1.5; }
        .leading-relaxed{ line-height: 1.7; }
        .bg-gray-200{ background:#d9d9d9; }
        .p-10{ padding: 40px; }
        .max-w-6xl{ max-width: 72rem; }
        .mx-auto{ margin-left:auto; margin-right:auto; }
        .w-44{ width: 11rem; }
        .w-56{ width: 14rem; }
        .w-60{ width: 15rem; }
        .w-64{ width: 16rem; }
        .w-72{ width: 18rem; }
        .max-h-\[78vh\]{ max-height: 78vh; }

        /* Poster-only responsive sizing: keeps readability consistent across desktop/mobile */
        #poster .w-44{ width: clamp(8rem, 15vmin, 11rem); }
        #poster .w-56{ width: clamp(9.5rem, 18vmin, 14rem); }
        #poster .w-60{ width: clamp(10rem, 19vmin, 15rem); }
        #poster .w-64{ width: clamp(10.5rem, 20vmin, 16rem); }
        #poster .w-72{ width: clamp(11.5rem, 22vmin, 18rem); }


        /* 自訂滑鼠游標（SVG/mouse.svg）— 隱藏系統游標，使用 #customCursor 跟隨滑鼠 */
body, .page, .clickable, button, a, img { cursor: none; }
.page {
            display: none;
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
        }

        .active {
            display: block;
        }

        /* 目錄選項反藍效果 */
        .menu-item:hover { background-color: #0000FF; color: white; padding: 0 10px; }

        /* 作品牆撥動效果：預設只做輕微 hover，真正的撥動在 JS 針對單張圖片 */
        .floating-img { transition: transform 0.18s ease-out; cursor: pointer; position: absolute; will-change: transform; }
        .floating-img:hover { z-index: 50; }
        #poster .pp-black-bg { background: #000000; }

        /* Poster layouts */
        #poster{ overflow: hidden; }
        .poster-desktop{ position: relative; width: 100%; height: 100%; display: block; }
        .poster-mobile{ display: none; }


        .landing-logo{ width: min(720px, 80vw); height: auto; display:block; }

        .landing-stage{ position:relative; width:100%; height:100%; min-height:100dvh; display:flex; align-items:center; justify-content:center; overflow:hidden; }
        .landing-bg{ position:absolute; inset:0; width:100%; height:100%; z-index:0; }
        .landing-bg-white{ background:#fff; }
        .landing-flash{
            object-fit:cover;
            opacity:0;
            transition: opacity 70ms linear;
            will-change: opacity, contents;
        }
        .landing-flash.active{ opacity:1; }
        .landing-logo-wrap{
            position:relative;
            z-index:1;
            display:inline-block;
            line-height:0;
        }
        .landing-logo{ position:relative; z-index:1; }
        .landing-logo-flash{
            pointer-events:none;
        }

        /* 目錄頁：使用 SVG 本體，大小一致＋上下輕微重疊（像參考圖） */
        #menu{ background:#ffffff; }
        .menu-stack{
            width: 100vw;
            height: 100vh;
            display:flex;
            align-items:center;
            justify-content:center;
        }
        .menu-stack-inner{
            width: min(820px, 84vw);
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            gap: 0px;
        }
        .menu-link{ user-select:none; }
        .menu-link img{
            width: 100%;
            height:auto;
            display:block;
        }
        /* 輕微重疊 */
        .menu-link + .menu-link{ margin-top: -18px; }

        .back-arrow { position: absolute; top: 44px; right: 44px; z-index: 100; }
        .back-icon{
            width: 51px;
            height: 51px;
            display:block;
        }
        .menu-back-icon{ width: 90px; height: 90px; }

        /* 檔案二的陰影字（頁3/頁6） */
        .shadow-type {
            position: relative;
            display: inline-block;
            color: #1f1b1b;
        }
        .shadow-type::after{
            content: attr(data-text);
            position: absolute;
            left: 10px;
            top: 10px;
            color: #d9d9d9;
            z-index: -1;
            white-space: pre;
        }

        /* 更像檔案二：大量留白、文字不要太粗 */
        .meta-text { font-size: 12px; line-height: 1.35; color: #111; }
        #identity .about-box{
            transform: scale(0.7);
            transform-origin: center;
            font-size: calc(18px / 0.7);
        }
        #identity .meta-text{
            font-size: 18px;
            line-height: 1.35;
        }
        .small-title {
            font-size: 22px;
            font-weight: 600;
            display: inline-block;
            line-height: 1.15;
            padding-top: 0.08em; /* prevent top glyph clipping on this font */
            padding-bottom: 0.03em;
            overflow: visible;
        }
        /* Work detail title style: white text with dark + light outline, tighter tracking */
        #detail .work-title{
            --title-stroke-dark: 12px;
            --title-stroke-light: 18px;
            position: relative;
            z-index: 0;
            display: inline-block;
            color: transparent;
            text-shadow: 0 -1.2px 0 #ffffff;
            letter-spacing: -0.07em;
            line-height: 0.96;
            white-space: pre-wrap;
            font-kerning: none;
            text-rendering: geometricPrecision;
        }
        #detail .work-title::before,
        #detail .work-title::after{
            content: attr(data-title);
            position: absolute;
            inset: 0;
            font: inherit;
            letter-spacing: inherit;
            line-height: inherit;
            white-space: inherit;
            font-kerning: inherit;
            text-rendering: inherit;
            pointer-events: none;
            transform: translateZ(0);
        }
        #detail .work-title::before{
            color: transparent;
            -webkit-text-stroke: var(--title-stroke-dark) #140305;
            z-index: -1;
        }
        #detail .work-title::after{
            color: transparent;
            -webkit-text-stroke: var(--title-stroke-light) #dbdcdc;
            z-index: -2;
        }
    
        .center-screen{ width:100%; height:100%; min-height:100dvh; display:flex; align-items:center; justify-content:center; }
        .menu-swap{ position:relative; width:min(400px, 52vw); }
        .menu-swap img{ width:100%; height:auto; display:block; user-select:none; -webkit-user-drag:none; }
        .menu-hotspots{
            position:absolute; inset:0;
            display:grid;
            grid-template-rows: repeat(3, 1fr);
            background: transparent;
        }
        #identity .identity-links{
            opacity: 1;
            pointer-events: auto;
        }
        #identity .identity-links.is-visible{
            opacity: 1;
            pointer-events: auto;
        }
        .menu-hotspot{
            appearance:none;
            border:none;
            background: transparent;
            cursor: none; /* use custom cursor */
            padding:0;
            margin:0;
        }
        /* Ensure no drop shadow on detail images */
        .detail-image{ box-shadow:none !important; filter:none !important; }
        .detail-gallery-nav{
          display: flex;
          align-items: center;
          gap: 10px;
          margin-top: 10px;
        }
        .detail-gallery-btn{
          border: 1px solid #111;
          background: transparent;
          color: #111;
          font-family: 'NeueMetanaNext', sans-serif;
          font-size: 12px;
          line-height: 1;
          padding: 4px 8px;
          cursor: none;
        }
        .detail-gallery-count{
          font-size: 11px;
          line-height: 1;
          color: #111;
        }
        /* Selected works: center artwork vertically in detail view */
        #detail.detail-center-art .detail-image-wrap{
          display: flex !important;
          align-items: center !important;
          justify-content: center !important;
          overflow: hidden !important;
        }
        #detail.detail-center-art .detail-image-stack{
          display: flex;
          width: 100%;
          height: 100%;
          align-items: center;
          justify-content: center;
        }
        #detail.detail-center-art .detail-image-stack img{
          width: auto !important;
          height: auto !important;
          max-width: 100% !important;
          max-height: calc(100vh - 48px) !important;
          object-fit: contain !important;
          margin: 0 auto !important;
        }
        .detail-mobile-info{ display: none; }
        .detail-image-stack{ display: none; }


        /* Custom cursor: SVG mouse */
#customCursor{
  position: fixed;
  top: 0; left: 0;
  width: 16px; height: 16px;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-100px, -100px);
  user-select: none;
  -webkit-user-drag: none;
  mix-blend-mode: normal;
  filter: none;
}
#customCursor.invert{
  mix-blend-mode: difference;
  filter: brightness(0) invert(1);
}
#customCursor.down{
  transform: translate(-100px, -100px) scale(0.88);
}

/* -----------------------------
   TOUCH / MOBILE SAFETY LAYER
   - Do NOT affect desktop layout
   - Restore system cursor on touch
   - Tweak sizes/positions for small screens
------------------------------ */

html.is-touch body,
html.is-touch .page,
html.is-touch .clickable,
html.is-touch button,
html.is-touch a,
html.is-touch img {
  cursor: auto !important;
}

html.is-touch #customCursor{ display:none !important; }
html.is-touch .detail-gallery-btn{ cursor: pointer; }

@media (max-width: 768px){
  :root{
    --mobile-back-top: max(28px, calc(env(safe-area-inset-top) + 10px));
    --mobile-back-right: 18px;
    --mobile-back-size: 41px;
  }
  /* allow the UI to breathe on mobile without touching desktop */
  .back-arrow{
    top: var(--back-arrow-y-mobile);
    left: 50%;
    right: auto;
    transform: translateX(-50%);
  }
  .back-icon{ width: var(--mobile-back-size); height: var(--mobile-back-size); }
  .menu-back-icon{ width: 78px; height: 78px; }

  /* Menu scaling (keeps the same design, just fits screen) */
  .menu-swap{ width: min(310px, 52vw); }
  .menu-link + .menu-link{ margin-top: -12px; }

  /* Identity: left-aligned text, horizontally centered block, smaller unified type */
  #identity .w-full.h-full.flex.items-center.justify-center{
    justify-content: center;
    padding-left: 18px;
    padding-right: 18px;
    box-sizing: border-box;
  }
  #identity .about-box{
    width: min(420px, 86vw) !important;
    padding: 0 !important;
    transform: none !important;
    font-size: 13px !important;
    line-height: 1.35 !important;
  }
  #identity .meta-text{
    font-size: 13px !important;
    line-height: 1.35 !important;
  }

  /* Detail layout: stack and fit */
  #detail .small-title{
    font-size: 18px;
    line-height: 1.18;
    padding-top: 0.08em;
  }
  #detail .work-title{
    --title-stroke-dark: 7px;
    --title-stroke-light: 11px;
    letter-spacing: -0.06em;
    line-height: 0.98;
  }
  #detail .meta-text{ font-size: 12px; }

  /* Mobile poster: vertical card feed */
  #poster{
    overflow-x: hidden;
    overflow-y: hidden;
  }
  #poster .back-arrow{
    position: fixed;
    top: var(--back-arrow-y-mobile);
    left: 50%;
    right: auto;
    transform: translateX(-50%);
    z-index: 140;
  }
  #poster .poster-desktop{ display: none; }
  #poster .poster-mobile{
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0;
    padding: 0;
    width: 100vw;
    height: 100vh;
    box-sizing: border-box;
  }
  #poster .poster-col{
    height: 100vh;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
  }
  #poster .poster-card{
    width: 100%;
    border: 0;
    background: #fff;
    margin: 0;
    box-sizing: border-box;
    line-height: 0;
  }
  #poster .poster-card img{
    display: block;
    width: 100%;
    height: auto;
  }

  /* Mobile detail: readable stacked layout */
  #detail{
    overflow-x: hidden;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  #detail .back-arrow{
    position: fixed;
    top: var(--back-arrow-y-mobile);
    left: 50%;
    right: auto;
    transform: translateX(-50%);
    z-index: 140;
  }
  #detail .w-full.h-full.relative{
    height: auto;
    min-height: 100%;
    display: block;
    padding: 0;
    box-sizing: border-box;
  }
  #detail .detail-mobile-info{
    display: block;
    position: fixed;
    left: 0;
    right: 0;
    top: 0;
    z-index: 130;
    background: #fff;
    padding: calc(var(--mobile-back-top) + 2px) 14px 14px;
    box-sizing: border-box;
  }
  #detail .detail-mobile-info .small-title{
    display: block;
    margin: 0;
    font-size: 18px;
    line-height: 1.18;
    padding-top: 0.08em;
    padding-right: calc(var(--mobile-back-size) + 26px);
    margin-bottom: 0.7em;
  }
  #detail .detail-mobile-info .meta-text{
    font-size: 12px;
    line-height: 1.22;
  }
  #detail #detailMetaMobile{
    margin-bottom: 1.1em;
  }
  #detail #detailDescMobile{
    margin-bottom: 0;
  }
  #detail #detailDescMobile{
    font-size: 10px;
    line-height: 1.25;
  }
  #detail .detail-title-wrap,
  #detail .detail-meta-wrap{
    display: none !important;
  }
  #detail .detail-image-wrap{
    position: static !important;
    left: auto !important;
    right: auto !important;
    top: auto !important;
    bottom: auto !important;
    width: 100% !important;
    display: block !important;
    margin-top: var(--detail-mobile-info-h, 120px);
  }
  #detail .detail-image-stack{
    display: block;
    width: 100vw;
  }
  #detail .detail-image-stack img{
    display: block;
    width: 100vw;
    height: auto;
  }
  #detail #detailImage{
    display: none;
  }
  #detail .detail-gallery-nav{
    display: none !important;
  }
}

/* Desktop-only rules */
@media (min-width: 769px){
  /* Desktop poster sizing: restore collage scale */
  #poster .w-44{ width: 11rem; }
  #poster .w-56{ width: 14rem; }
  #poster .w-60{ width: 15rem; }
  #poster .w-64{ width: 16rem; }
  #poster .w-72{ width: 18rem; }
  #detail #detailDesc{
    font-size: 10px;
    line-height: 1.35;
  }
  #detail .detail-copy-group{
    transform: none;
  }
  /* Restore previous desktop type scale distribution for work info */
  #detail .small-title{
    font-size: 33px;
    line-height: 1.14;
    padding-top: 0.08em;
    padding-bottom: 0.04em;
  }
  #detail #detailMeta{
    font-size: 18px;
    line-height: 1.22;
  }
  #detail #detailDesc{
    font-size: 15px;
    line-height: 1.32;
  }
  #detail .detail-title-wrap.detail-copy-group{
    transform-origin: top left;
  }
  #detail .detail-meta-wrap.detail-copy-group{
    transform-origin: bottom left;
  }

  /* Desktop detail zones are max boundaries (not alignment targets) */
  #detail .w-full.h-full.relative{
    position: relative;
    height: 100%;
    overflow: hidden;
  }
  #detail .detail-title-wrap,
  #detail .detail-meta-wrap,
  #detail .detail-image-wrap{
    position: absolute !important;
    width: auto !important;
  }
  #detail .detail-title-wrap{
    left: clamp(56px, 6vw, 110px) !important;
    top: clamp(56px, 8vh, 120px) !important;
    right: auto !important;
    bottom: auto !important;
    max-width: min(26vw, 380px);
    overflow: visible;
  }
  #detail .detail-meta-wrap{
    left: clamp(56px, 6vw, 110px) !important;
    bottom: clamp(56px, 8vh, 120px) !important;
    top: auto !important;
    right: auto !important;
    width: min(25vw, 360px) !important;
  }
  #detail .detail-image-wrap{
    left: 34vw !important;
    right: 16vw !important;
    top: 24px !important;
    bottom: 24px !important;
    display: block !important;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
  }
  #detail .detail-image-stack{
    display: block;
    width: 100%;
    line-height: 0;
  }
  #detail .detail-image-stack img{
    display: block;
    width: auto;
    height: calc(100vh - 48px);
    max-width: none;
    max-height: none;
    margin: 0 auto;
    object-fit: cover;
  }
  #detail #detailImage{
    display: none;
  }
  #detail .detail-gallery-nav{
    display: none !important;
  }
  /* Desktop poster: per-image upscale to tighten collage density */
  #poster .poster-desktop > img:nth-child(1){ width: 17rem; }
  #poster .poster-desktop > img:nth-child(2){ width: 16.5rem; }
  #poster .poster-desktop > img:nth-child(3){ width: 14rem; }
  #poster .poster-desktop > img:nth-child(4){ width: 13.5rem; }
  #poster .poster-desktop > img:nth-child(5){ width: 18.5rem; }
  #poster .poster-desktop > img:nth-child(6){ width: 22rem; }
  #poster .poster-desktop > img:nth-child(7){ width: 17rem; }
  #poster .poster-desktop > img:nth-child(8){ width: 19rem; }
  #poster .poster-desktop > img:nth-child(9){ width: 19rem; }
  #poster .poster-desktop > img:nth-child(10){ width: 17rem; }
  #poster .poster-desktop > img:nth-child(11){ width: 18rem; }
  #poster .poster-desktop > img:nth-child(12){ width: 14.5rem; }
  #poster .poster-desktop > img:nth-child(13){ width: 16.5rem; }
}
</style>
</head>
<body>

    <!-- landing（對齊檔案二：頁6） -->
    <div id="landing" class="page active">
        <div class="landing-stage">
            <div class="landing-bg landing-bg-white" aria-hidden="true"></div>
            <img src="SVG/liminalsynths-logo.svg" id="landingLogo" class="landing-logo clickable" alt="liminalsynths" onclick="goTo('menu')">
        </div>
    </div>

    
<div id="menu" class="page">
    <div class="back-arrow clickable" onclick="goTo('landing')">
         <img src="SVG/資產 18.svg" alt="back" class="back-icon">
    </div>

    <div class="center-screen">
        <div class="menu-swap">
            <img id="menuSvg" src="SVG/資產 17.svg" alt="menu" draggable="false"/>
            <div class="menu-hotspots" aria-label="menu hotspots">
                <button class="menu-hotspot" data-src="SVG/資產 16.svg" data-target="identity" aria-label="identity"></button>
                <button class="menu-hotspot" data-src="SVG/資產 15.svg" data-target="poster" aria-label="graphic"></button>
                <button class="menu-hotspot" data-src="SVG/資產 14.svg" data-target="project" aria-label="motion"></button>
            </div>
        </div>
    </div>
</div>

    <div id="identity" class="page">
        <div class="back-arrow clickable" onclick="goTo('menu')"><img src="SVG/資產 18.svg" alt="back" class="back-icon"></div>
        <div class="w-full h-full flex items-center justify-center">
            <div class="about-box p-10 text-left text-2xl" style="width: min(680px, 84vw); line-height:1.45; background:transparent;">
                In the liminal state between<br>
                medium and concept, synths emerge.<br><br>
                features visual creations<br>
                in various forms.<br><br><br><br><br>
                <div class="identity-links" id="identityLinks">
                    <div class="meta-text">
                        <a href="mailto:liminalsynths@gmail.com" class="clickable" style="color:inherit; text-decoration:none;">liminalsynths@gmail.com</a>
                    </div>
                    <div class="meta-text" style="margin-top:10px;">
                        <a href="https://www.instagram.com/liminalsynths/" target="_blank" rel="noopener noreferrer" class="clickable" style="color:inherit; text-decoration:none;">@liminalsynths</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="poster" class="page" style="background: white;">
        <div class="back-arrow clickable" onclick="goTo('menu')"><img src="SVG/資產 18.svg" alt="back" class="back-icon"></div>

        <!-- Desktop: collage -->
        <div class="poster-desktop">
            <img src="image/works/mutant/cover.png" class="floating-img w-56" style="top:8%; left:8%;"  onclick="openPoster('mutant')"   alt="mutant">
            <img src="image/works/melite/cover.jpg" class="floating-img w-56" style="top:22%; left:16%;" onclick="openPoster('melite')"   alt="melite">
            <img src="image/works/pearl/cover.png" class="floating-img w-44" style="top:12%; left:34%;" onclick="openPoster('pearl')"   data-placeholder="pearl"   alt="pearl">
            <img src="image/works/passion/cover.jpg" class="floating-img w-44" style="top:26%; left:38%;" onclick="openPoster('passion')" data-placeholder="passion" alt="passion">
            <img src="image/works/meteorite/cover.png" class="floating-img w-60" style="top:8%; left:50%;"  onclick="openPoster('meteorite')" alt="meteorite">

            <img src="image/works/multiboost/cover.jpg" class="floating-img w-72" style="top:14%; left:64%;" onclick="openPoster('multiboost')" alt="multiboost">

<script src="data/works.js"></script>
<script>
(() => {
  const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints && navigator.maxTouchPoints > 0);
  if (isTouch) document.documentElement.classList.add('is-touch');

  const pages = document.querySelectorAll('.page');
  const TYPE_BASE_MS = 210;
  const TYPE_MIN_TICK = 8;
  const TYPE_CURSOR_HOLD = 24;
  const TYPE_STREAM_TICK = 10;
  const TYPE_STREAM_STEP_CHARS = 2;
  const typeOriginalText = new Map();
  const activeTypeTimers = new Map();
  const activeTypeCursorTimers = new Map();
  const pendingTypeStarts = new Set();

  function clearAllTypeEffects() {
    pendingTypeStarts.forEach((timerId) => window.clearTimeout(timerId));
    pendingTypeStarts.clear();

    activeTypeTimers.forEach((timerId) => window.clearInterval(timerId));
    activeTypeTimers.clear();

    activeTypeCursorTimers.forEach((timerId) => window.clearTimeout(timerId));
    activeTypeCursorTimers.clear();

    typeOriginalText.forEach((original, node) => {
      if (node && node.nodeValue !== undefined) node.nodeValue = original;
    });
  }

  function typeTextNode(node, baseDuration = TYPE_BASE_MS, cursorHoldMs = TYPE_CURSOR_HOLD) {
    if (!node) return;
    const cachedOriginal = typeOriginalText.get(node);
    const original = (cachedOriginal !== undefined) ? cachedOriginal : (node.nodeValue || '');
    if (!original.trim()) return;
    if (cachedOriginal === undefined) typeOriginalText.set(node, original);

    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reduceMotion) return;

    const prevTimer = activeTypeTimers.get(node);
    if (prevTimer) window.clearInterval(prevTimer);
    const prevCursorTimer = activeTypeCursorTimers.get(node);
    if (prevCursorTimer) window.clearTimeout(prevCursorTimer);

    const totalChars = original.length;
    const tick = Math.max(TYPE_MIN_TICK, Math.floor(baseDuration / Math.max(1, totalChars)));
    let idx = 0;
    node.nodeValue = '|';

    const timer = window.setInterval(() => {
      idx += 1;
      if (idx >= totalChars) {
        window.clearInterval(timer);
        activeTypeTimers.delete(node);
        if (cursorHoldMs <= 0) {
          node.nodeValue = original;
          return;
        }
        node.nodeValue = `${original}|`;
        const cursorTimer = window.setTimeout(() => {
          node.nodeValue = original;
          activeTypeCursorTimers.delete(node);
        }, cursorHoldMs);
        activeTypeCursorTimers.set(node, cursorTimer);
        return;
      }
      node.nodeValue = `${original.slice(0, idx)}|`;
    }, tick);

    activeTypeTimers.set(node, timer);
  }

  function typePageText(pageEl) {
    if (!pageEl) return;
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reduceMotion) return;

    const collectTargets = (root, excludeSelector = null) => {
      if (!root) return [];
      const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
      const targets = [];
      let node = walker.nextNode();
      while (node) {
        const parent = node.parentElement;
        if (parent && !parent.closest('.back-arrow') && !parent.closest('.work-title')) {
          if (!excludeSelector || !parent.closest(excludeSelector)) {
            const tag = parent.tagName;
            if (tag !== 'SCRIPT' && tag !== 'STYLE') {
              if (!typeOriginalText.has(node)) typeOriginalText.set(node, node.nodeValue || '');
              targets.push(node);
            }
          }
        }
        node = walker.nextNode();
      }
      return targets;
    };

    const startStream = (targets) => {
      const stream = [];
      targets.forEach((textNode) => {
        const source = typeOriginalText.get(textNode) || '';
        if (!source.trim()) return;
        textNode.nodeValue = '';
        stream.push({ node: textNode, text: source });
      });
      if (!stream.length) return;

      let blockIndex = 0;
      let charIndex = 0;
      const tick = TYPE_STREAM_TICK;

      const step = () => {
        if (blockIndex >= stream.length) return;
        let remain = TYPE_STREAM_STEP_CHARS;
        while (remain > 0 && blockIndex < stream.length) {
          const block = stream[blockIndex];
          const left = block.text.length - charIndex;
          const add = Math.min(remain, left);
          charIndex += add;
          const done = charIndex >= block.text.length;
          block.node.nodeValue = done ? block.text : `${block.text.slice(0, charIndex)}|`;
          remain -= add;
          if (done) {
            blockIndex += 1;
            charIndex = 0;
          }
        }
        if (blockIndex >= stream.length) return;

        const t = window.setTimeout(() => {
          pendingTypeStarts.delete(t);
          step();
        }, tick);
        pendingTypeStarts.add(t);
      };

      const first = window.setTimeout(() => {
        pendingTypeStarts.delete(first);
        step();
      }, tick);
      pendingTypeStarts.add(first);
    };

    if (pageEl.id === 'identity') {
      const conceptTargets = collectTargets(pageEl, '#identityLinks');
      const linksTargets = collectTargets(document.getElementById('identityLinks'));
      startStream(conceptTargets);
      startStream(linksTargets);
      return;
    }

    startStream(collectTargets(pageEl));
  }

  function goTo(pageId) {
    clearAllTypeEffects();
    const target = document.getElementById(pageId);
    if (target) typePageText(target);
    pages.forEach(p => p.classList.remove('active'));
    if (target) {
      target.classList.add('active');
      queuePosterBackBlendUpdate();
    }

    // Init per-page interactions (lazy)
    if (pageId === 'menu') initMenuSwap();
    if (pageId === 'poster') {
      ensurePosterPlaceholders();
      initPosterInteraction();
    }
  }
  window.goTo = goTo;

  const LANDING_FLASH_FILES = [
    '10.jpg',
    '11.jpg',
    '12.jpg',
    '123 #U62f7#U8c9d-2.jpg',
    '13.png',
    '14.jpg',
    '2.png',
    '3.jpg',
    '4.png',
    '5.jpg',
    '6.png',
    '7.jpg',
    '8.jpg',
    '9.jpg',
    'Meteorite 2021.png',
    'a #U62f7#U8c9dnofont-2.jpg',
    'born this way ism.jpg',
    'coverthed.jpg',
    'foray 2021.jpg',
    'iridescent 2017.jpg',
    'mirror 2021.jpg',
    'multiboost.jpg',
    'strike 2021.jpg'
  ].map(name => `image/${encodeURIComponent(name)}`);

  function initLandingFlash() {
    const logo = document.querySelector('.landing-logo-wrap');
    const flashLayer = document.getElementById('landingLogoFlash');
    const blueBaseLayer = document.getElementById('landingLogoBlueBase');
    if (!logo || !flashLayer || !LANDING_FLASH_FILES.length) return;

    let timer = null;
    let lastIndex = -1;

    const setRandomFlash = () => {
      if (LANDING_FLASH_FILES.length === 1) {
        flashLayer.setAttribute('href', LANDING_FLASH_FILES[0]);
        flashLayer.setAttributeNS('http://www.w3.org/1999/xlink', 'xlink:href', LANDING_FLASH_FILES[0]);
        return;
      }

      let nextIndex = Math.floor(Math.random() * LANDING_FLASH_FILES.length);
      while (nextIndex === lastIndex) {
        nextIndex = Math.floor(Math.random() * LANDING_FLASH_FILES.length);
      }
      lastIndex = nextIndex;
      flashLayer.setAttribute('href', LANDING_FLASH_FILES[nextIndex]);
      flashLayer.setAttributeNS('http://www.w3.org/1999/xlink', 'xlink:href', LANDING_FLASH_FILES[nextIndex]);
    };

    const startFlash = () => {
      if (timer) return;
      if (blueBaseLayer) blueBaseLayer.classList.add('active');
      flashLayer.classList.add('active');
      setRandomFlash();
      timer = window.setInterval(setRandomFlash, 45);
    };

    const stopFlash = () => {
      if (timer) {
        window.clearInterval(timer);
        timer = null;
      }
      if (blueBaseLayer) blueBaseLayer.classList.remove('active');
      flashLayer.classList.remove('active');
    };

    logo.addEventListener('mouseenter', startFlash);
    logo.addEventListener('mouseleave', stopFlash);
    logo.addEventListener('blur', stopFlash);
  }

  initLandingFlash();

  // ---------------------------
  // Poster metadata source:
  // data/works.js -> window.WORKS_DATA
  // ---------------------------
  const POSTER_WORKS = window.WORKS_DATA || {};
  let currentWorkKey = null;
  let currentImageIndex = 0;

  function buildPlaceholderDataURI(work) {
    const no = String(work.no || '').padStart(2, '0');
    const title = (work.title || 'untitled').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const svg = `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1200" viewBox="0 0 900 1200">
  <rect width="900" height="1200" fill="#e9e9e9"/>
  <rect x="40" y="40" width="820" height="1120" fill="none" stroke="#111" stroke-opacity="0.18" stroke-width="2"/>
  <text x="70" y="150" font-family="NeueMetanaNext, Arial" font-size="64" fill="#111" fill-opacity="0.75">${no}</text>
  <text x="70" y="240" font-family="NeueMetanaNext, Arial" font-size="44" fill="#111" fill-opacity="0.75">${title}</text>
  <text x="70" y="310" font-family="NeueMetanaNext, Arial" font-size="26" fill="#111" fill-opacity="0.55">image pending</text>
</svg>`;
    return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
  }

  function ensurePosterPlaceholders() {
    // Any <img class="floating-img"> with data-placeholder gets a generated SVG poster.
    const imgs = document.querySelectorAll('#poster img.floating-img[data-placeholder]');
    imgs.forEach(img => {
      const key = img.getAttribute('data-placeholder');
      const work = POSTER_WORKS[key];
      if (!work) return;
      if (img.getAttribute('src')) return;
      img.src = buildPlaceholderDataURI(work);
    });
  }

  function getWorkImages(work) {
    if (!work) return [];
    if (Array.isArray(work.images) && work.images.length) return work.images;
    if (work.image) return [work.image];
    if (work.cover) return [work.cover];
    return [];
  }

  function updateDetailGalleryControls(work, imageCount, imageIndex) {
    const navEl = document.getElementById('detailGalleryNav');
    const countEl = document.getElementById('detailGalleryCount');
    if (!navEl || !countEl) return;

    if (!work || imageCount <= 1) {
      navEl.style.display = 'none';
      countEl.textContent = '1 / 1';
      return;
    }

    navEl.style.display = 'flex';
    countEl.textContent = `${imageIndex + 1} / ${imageCount}`;
  }

  function syncMobileDetailInfoOffset() {
    const detailPage = document.getElementById('detail');
    const infoBox = document.getElementById('detailMobileInfo');
    if (!detailPage || !infoBox) return;
    if (window.innerWidth >= 769) return;
    const h = Math.ceil(infoBox.getBoundingClientRect().height);
    detailPage.style.setProperty('--detail-mobile-info-h', `${h + 8}px`);
  }

  function renderPosterDetail(key, requestedIndex = 0) {
    const work = POSTER_WORKS[key];
    const detailPage = document.getElementById('detail');
    const detailMobileInfo = document.getElementById('detailMobileInfo');
    const titleEl = document.getElementById('detailTitle');
    const metaEl = document.getElementById('detailMeta');
    const descEl = document.getElementById('detailDesc');
    const imgEl = document.getElementById('detailImage');
    const titleMobileEl = document.getElementById('detailTitleMobile');
    const metaMobileEl = document.getElementById('detailMetaMobile');
    const descMobileEl = document.getElementById('detailDescMobile');
    const stackEl = document.getElementById('detailImageStack');

    if (!titleEl || !metaEl || !descEl || !imgEl) return;
    const centeredArtKeys = new Set(['parallel_paradise', 'fallen_angel', 'stupid']);

    const applyDetailTheme = (isDark) => {
      const textColor = isDark ? '#ffffff' : '#111111';
      const bgColor = isDark ? '#000000' : '#ffffff';
      if (detailPage) detailPage.style.backgroundColor = bgColor;
      if (detailMobileInfo) detailMobileInfo.style.backgroundColor = bgColor;
      metaEl.style.color = textColor;
      descEl.style.color = textColor;
      if (metaMobileEl) metaMobileEl.style.color = textColor;
      if (descMobileEl) descMobileEl.style.color = textColor;

      const navCount = document.getElementById('detailGalleryCount');
      if (navCount) navCount.style.color = textColor;
      const navBtns = document.querySelectorAll('#detail .detail-gallery-btn');
      navBtns.forEach((btn) => {
        btn.style.color = textColor;
        btn.style.borderColor = textColor;
      });
    };

    if (!work) {
      applyDetailTheme(false);
      if (detailPage) detailPage.classList.remove('detail-center-art');
      currentWorkKey = null;
      currentImageIndex = 0;
      titleEl.textContent = '—';
      titleEl.setAttribute('data-title', '—');
      metaEl.innerHTML = '—';
      descEl.textContent = '';
      if (titleMobileEl) {
        titleMobileEl.textContent = '—';
        titleMobileEl.setAttribute('data-title', '—');
      }
      if (metaMobileEl) metaMobileEl.innerHTML = '—';
      if (descMobileEl) descMobileEl.textContent = '';
      imgEl.src = buildPlaceholderDataURI({ no: '--', title: 'not found' });
      if (stackEl) stackEl.innerHTML = '';
      updateDetailGalleryControls(null, 0, 0);
      window.requestAnimationFrame(syncMobileDetailInfoOffset);
      return;
    }

    applyDetailTheme(key === 'parallel_paradise');
    if (detailPage) detailPage.classList.toggle('detail-center-art', centeredArtKeys.has(key));

    titleEl.textContent = work.title;
    titleEl.setAttribute('data-title', work.title);
    metaEl.innerHTML = `${work.year}<br>${work.type}`;
    descEl.textContent = work.desc;
    if (titleMobileEl) {
      titleMobileEl.textContent = work.title;
      titleMobileEl.setAttribute('data-title', work.title);
    }
    if (metaMobileEl) metaMobileEl.innerHTML = `${work.year}<br>${work.type}`;
    if (descMobileEl) descMobileEl.textContent = work.desc;

    const images = getWorkImages(work);
    const maxIndex = Math.max(0, images.length - 1);
    const safeIndex = Math.min(Math.max(0, requestedIndex), maxIndex);
    currentWorkKey = key;
    currentImageIndex = safeIndex;

    imgEl.src = images[safeIndex] || buildPlaceholderDataURI(work);
    imgEl.alt = work.title;

    if (stackEl) {
      stackEl.innerHTML = '';
      const mobileImages = images.length ? images : [buildPlaceholderDataURI(work)];
      mobileImages.forEach((src, idx) => {
        const stackImg = document.createElement('img');
        stackImg.src = src;
        stackImg.alt = `${work.title} ${idx + 1}`;
        stackEl.appendChild(stackImg);
      });
    }

    // Force vertical centering for selected works on desktop detail view.
    const wrapEl = document.querySelector('#detail .detail-image-wrap');
    if (detailPage && wrapEl && stackEl) {
      const shouldCenter = centeredArtKeys.has(key);
      if (shouldCenter) {
        const isMobileView = window.innerWidth < 769;
        wrapEl.style.display = 'flex';
        wrapEl.style.alignItems = 'center';
        wrapEl.style.justifyContent = 'center';
        wrapEl.style.overflowY = 'hidden';
        wrapEl.style.overflowX = 'hidden';
        if (isMobileView) {
          detailPage.style.overflowY = 'hidden';
          wrapEl.style.marginTop = 'var(--detail-mobile-info-h, 120px)';
          wrapEl.style.height = 'calc(var(--back-arrow-y-mobile, 73dvh) - var(--detail-mobile-info-h, 120px) - 12px)';
        } else {
          detailPage.style.overflowY = '';
          wrapEl.style.marginTop = '';
          wrapEl.style.height = '100%';
        }
        stackEl.style.display = 'flex';
        stackEl.style.alignItems = 'center';
        stackEl.style.justifyContent = 'center';
        stackEl.style.height = '100%';
        stackEl.style.transform = '';
        stackEl.querySelectorAll('img').forEach((img) => {
          img.style.width = 'auto';
          img.style.height = 'auto';
          img.style.maxWidth = isMobileView ? '92vw' : '100%';
          img.style.maxHeight = isMobileView
            ? 'calc(var(--back-arrow-y-mobile, 73dvh) - var(--detail-mobile-info-h, 120px) - 20px)'
            : 'calc(100vh - 48px)';
          img.style.objectFit = 'contain';
          img.style.margin = '0 auto';
        });
      } else {
        detailPage.style.overflowY = '';
        wrapEl.style.display = '';
        wrapEl.style.alignItems = '';
        wrapEl.style.justifyContent = '';
        wrapEl.style.overflowY = '';
        wrapEl.style.overflowX = '';
        wrapEl.style.marginTop = '';
        wrapEl.style.height = '';
        stackEl.style.display = '';
        stackEl.style.alignItems = '';
        stackEl.style.justifyContent = '';
        stackEl.style.height = '';
        stackEl.style.transform = '';
        stackEl.querySelectorAll('img').forEach((img) => {
          img.style.width = '';
          img.style.height = '';
          img.style.maxWidth = '';
          img.style.maxHeight = '';
          img.style.objectFit = '';
          img.style.margin = '';
        });
      }
    }

    updateDetailGalleryControls(work, images.length, safeIndex);
    window.requestAnimationFrame(syncMobileDetailInfoOffset);
    window.setTimeout(syncMobileDetailInfoOffset, 120);
  }

  function prevDetailImage() {
    const work = POSTER_WORKS[currentWorkKey];
    const images = getWorkImages(work);
    if (!work || images.length <= 1) return;
    const nextIndex = (currentImageIndex - 1 + images.length) % images.length;
    renderPosterDetail(currentWorkKey, nextIndex);
    window.requestAnimationFrame(syncDetailImageFit);
  }

  function nextDetailImage() {
    const work = POSTER_WORKS[currentWorkKey];
    const images = getWorkImages(work);
    if (!work || images.length <= 1) return;
    const nextIndex = (currentImageIndex + 1) % images.length;
    renderPosterDetail(currentWorkKey, nextIndex);
    window.requestAnimationFrame(syncDetailImageFit);
  }
  window.prevDetailImage = prevDetailImage;
  window.nextDetailImage = nextDetailImage;

  function syncDetailImageFit() {
    const wrap = document.querySelector('#detail .detail-image-wrap');
    const img = document.getElementById('detailImage');
    if (!wrap || !img) return;

    wrap.classList.remove('prefer-fill');
    if (window.innerWidth < 769) return;
    if (!img.naturalWidth || !img.naturalHeight) return;
  }

  function openPoster(key) {
    ensurePosterPlaceholders();
    renderPosterDetail(key);
    goTo('detail');
    const detailPage = document.getElementById('detail');
    if (detailPage) detailPage.scrollTop = 0;
    window.requestAnimationFrame(syncDetailImageFit);
    window.requestAnimationFrame(syncMobileDetailInfoOffset);
    window.setTimeout(syncDetailImageFit, 80);
    window.setTimeout(syncMobileDetailInfoOffset, 120);
  }
  window.openPoster = openPoster;

  window.addEventListener('resize', syncDetailImageFit);
  window.addEventListener('resize', syncMobileDetailInfoOffset);

  const detailImageEl = document.getElementById('detailImage');
  if (detailImageEl) {
    detailImageEl.addEventListener('load', syncDetailImageFit);
  }

  const posterBackIcon = document.getElementById('posterBackIcon');
  const updatePosterBackIconBlend = () => {
    if (!posterBackIcon) return;
    const posterPage = document.getElementById('poster');
    if (!posterPage || !posterPage.classList.contains('active')) {
      posterBackIcon.classList.remove('poster-invert');
      return;
    }

    const rect = posterBackIcon.getBoundingClientRect();
    const x = rect.left + rect.width / 2;
    const y = rect.top + rect.height / 2;
    const stack = document.elementsFromPoint(x, y);
    const isOnPosterImage = stack.some((el) => {
      if (!el || !(el instanceof Element)) return false;
      if (el === posterBackIcon) return false;
      if (el.id === 'customCursor') return false;
      if (el.closest('.back-arrow')) return false;
      return !!el.closest('#poster .floating-img, #poster .poster-card img');
    });
    posterBackIcon.classList.toggle('poster-invert', isOnPosterImage);
  };

  let posterBackBlendQueued = false;
  function queuePosterBackBlendUpdate() {
    if (posterBackBlendQueued) return;
    posterBackBlendQueued = true;
    window.requestAnimationFrame(() => {
      posterBackBlendQueued = false;
      updatePosterBackIconBlend();
    });
  }

  document.addEventListener('mousemove', queuePosterBackBlendUpdate, { passive: true });
  document.addEventListener('scroll', queuePosterBackBlendUpdate, { passive: true, capture: true });
  window.addEventListener('resize', queuePosterBackBlendUpdate);
  window.addEventListener('touchmove', queuePosterBackBlendUpdate, { passive: true });

  // -------- Menu hover swap (single SVG + hotspots) --------
  let menuInited = false;
  function initMenuSwap() {
    if (menuInited) return;
    const menuSvg = document.getElementById('menuSvg');
    const btns = document.querySelectorAll('.menu-hotspot');
    if (!menuSvg || !btns.length) return;

    const originalSrc = menuSvg.getAttribute('src') || 'SVG/資產 17.svg';

    btns.forEach(btn => {
      const hoverSrc = btn.getAttribute('data-src');
      const target = btn.getAttribute('data-target');

      btn.addEventListener('mouseenter', () => {
        if (hoverSrc) menuSvg.src = hoverSrc;
      });
      btn.addEventListener('mouseleave', () => {
        menuSvg.src = originalSrc;
      });
      btn.addEventListener('click', () => {
        if (target) goTo(target);
      });
    });

    // safety reset
    menuSvg.src = originalSrc;
    menuInited = true;
  }

  // -------- Custom cursor (SVG/mouse.svg) --------
  let cursor = null;
  if (!isTouch) {
    cursor = document.createElement('img');
    cursor.id = 'customCursor';
    cursor.src = 'SVG/mouse.svg';
    cursor.alt = 'cursor';
    document.body.appendChild(cursor);
  }
  // Landing logo hover swap (white -> blue)
  const landingLogo = document.getElementById('landingLogo');
  if (landingLogo) {
    const logoNormal = 'SVG/liminalsynths-logo.svg';
    const logoBlue = 'SVG/liminalsynths-logo blue.svg';
    landingLogo.addEventListener('mouseenter', () => { landingLogo.src = logoBlue; });
    landingLogo.addEventListener('mouseleave', () => { landingLogo.src = logoNormal; });
  }


  // keep cursor centered on the pointer
  const placeCursor = (x, y, scale=1) => {
    if (!cursor) return;
    cursor.style.left = x + 'px';
    cursor.style.top  = y + 'px';
    cursor.style.transform = `translate(-50%, -50%) scale(${scale})`;
  };

  let lastX = -100, lastY = -100;
  const CURSOR_INVERT_TARGETS = '.floating-img, #detailImage, .poster-card img';
  const updateCursorInvertState = (x, y) => {
    if (!cursor) return;
    const detailPage = document.getElementById('detail');
    const isParallelParadiseDetail =
      !!(detailPage &&
         detailPage.classList.contains('active') &&
         currentWorkKey === 'parallel_paradise');
    if (isParallelParadiseDetail) {
      cursor.classList.add('invert');
      return;
    }
    const el = document.elementFromPoint(x, y);
    const shouldInvert = !!(el && el.closest && el.closest(CURSOR_INVERT_TARGETS));
    cursor.classList.toggle('invert', shouldInvert);
  };
  if (cursor) {
    document.addEventListener('mousemove', (e) => {
      lastX = e.clientX;
      lastY = e.clientY;
      placeCursor(lastX, lastY, cursor.classList.contains('down') ? 0.88 : 1);
      updateCursorInvertState(lastX, lastY);
    });

    document.addEventListener('mousedown', () => {
      cursor.classList.add('down');
      placeCursor(lastX, lastY, 0.88);
    });

    document.addEventListener('mouseup', () => {
      cursor.classList.remove('down');
      placeCursor(lastX, lastY, 1);
    });
  }

  // -------- Poster interactions: drag drift + collision bounce ---: drag drift + collision bounce --------
  let posterInited = false;

  function initPosterInteraction() {
    if (posterInited) return;
    if (window.matchMedia('(max-width: 768px)').matches) return;

    const poster = document.getElementById('poster');
    if (!poster) return;

    const items = Array.from(poster.querySelectorAll('img.floating-img'));
    if (!items.length) { posterInited = true; return; }

    // disable CSS transition to avoid fighting physics
    items.forEach(el => (el.style.transition = 'none'));

    const states = items.map((el) => {
      const rect = el.getBoundingClientRect();
      const rand = () => Math.random();
      return {
        el,
        baseX: rect.left,
        baseY: rect.top,
        w: rect.width,
        h: rect.height,
        // physics offsets
        x: 0, y: 0,
        vx: (rand() - 0.5) * 6,
        vy: (rand() - 0.5) * 6,
        // idle float params (water-like drift)
        phx: rand() * Math.PI * 2,
        phy: rand() * Math.PI * 2,
        ampx: 3 + rand() * 2,
        ampy: 3 + rand() * 3,
        fx: 0.8 + rand() * 0.6,
        fy: 0.8 + rand() * 0.6,
        // cached float offset
        floatX: 0,
        floatY: 0
      };
    });

    // rebase on resize (keeps offsets)
    const rebake = () => {
      states.forEach(s => {
        const r = s.el.getBoundingClientRect();
        // keep current visual position = base + x + float
        s.baseX = r.left - s.x - s.floatX;
        s.baseY = r.top - s.y - s.floatY;
        s.w = r.width;
        s.h = r.height;
      });
    };
    window.addEventListener('resize', () => requestAnimationFrame(rebake));

    // pointer tracking for "tug" effect on hover
    const pointer = { x: -9999, y: -9999, dx: 0, dy: 0, lastX: -9999, lastY: -9999 };
    const updatePointer = (x, y) => {
      pointer.dx = x - pointer.lastX;
      pointer.dy = y - pointer.lastY;
      pointer.lastX = x;
      pointer.lastY = y;
      pointer.x = x;
      pointer.y = y;
    };

    document.addEventListener('mousemove', (e) => {
      if (!poster.classList.contains('active')) return;
      updatePointer(e.clientX, e.clientY);
    });

    document.addEventListener('touchstart', (e) => {
      if (!poster.classList.contains('active')) return;
      const t = e.touches && e.touches[0];
      if (!t) return;
      // initialize last to avoid giant impulse
      pointer.lastX = t.clientX;
      pointer.lastY = t.clientY;
      pointer.x = t.clientX;
      pointer.y = t.clientY;
      pointer.dx = 0;
      pointer.dy = 0;
    }, { passive: true });

    document.addEventListener('touchmove', (e) => {
      if (!poster.classList.contains('active')) return;
      const t = e.touches && e.touches[0];
      if (!t) return;
      updatePointer(t.clientX, t.clientY);
    }, { passive: true });

    const findStateFromPoint = (x, y) => {
      const hit = document.elementFromPoint(x, y);
      if (!hit) return null;
      const img = hit.closest && hit.closest('img.floating-img');
      if (!img) return null;
      return states.find(s => s.el === img) || null;
    };

    // physics constants
    const overlapLimit = 1/3;       // <-- stricter: don't overlap more than 1/3
    const friction = 0.82;
    const maxSpeed = 18;
    const edgeBounce = 0.55;

    // hover/tug tuning
    const dragImpulse = 0.25;       // how much the hovered item follows cursor movement
    const attractImpulse = 0.006;   // how much it "leans" toward cursor even when cursor stops
    const neighborRadius = 260;
    const neighborFalloff = 0.10;

    // collision tuning
    const repel = 0.008;            // velocity push
    const pushOut = 12;             // positional correction

    let lastT = performance.now();

    function step(t) {
      requestAnimationFrame(step);
      if (!poster.classList.contains('active')) return;

      const dt = Math.min(0.032, Math.max(0.010, (t - lastT) / 1000));
      lastT = t;

      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const margin = 10;

      // ---- idle float (water surface) ----
      for (const s of states) {
        // slow drifting offset
        s.floatX = Math.sin(t * 0.00022 * s.fx + s.phx) * s.ampx;
        s.floatY = Math.cos(t * 0.00019 * s.fy + s.phy) * s.ampy;
      }

      // ---- hover tug (no need to drag) ----
      const hovered = findStateFromPoint(pointer.x, pointer.y);
      if (hovered) {
        // 1) follow cursor movement a bit
        const md = Math.abs(pointer.dx) + Math.abs(pointer.dy);
        if (md > 0.2) {
          hovered.vx += pointer.dx * dragImpulse;
          hovered.vy += pointer.dy * dragImpulse;
        }

        // 2) slight attraction toward cursor (even when cursor is slow)
        const cx = (hovered.baseX + hovered.x + hovered.floatX) + hovered.w / 2;
        const cy = (hovered.baseY + hovered.y + hovered.floatY) + hovered.h / 2;
        const ax = pointer.x - cx;
        const ay = pointer.y - cy;
        hovered.vx += ax * attractImpulse;
        hovered.vy += ay * attractImpulse;

        // 3) nudge neighbors a little (water ripple)
        states.forEach(o => {
          if (o === hovered) return;
          const ocx = (o.baseX + o.x + o.floatX) + o.w/2;
          const ocy = (o.baseY + o.y + o.floatY) + o.h/2;
          const d = Math.hypot(ocx - cx, ocy - cy);
          if (d < neighborRadius) {
            const falloff = (1 - d / neighborRadius) * neighborFalloff;
            o.vx += (pointer.dx * dragImpulse) * falloff;
            o.vy += (pointer.dy * dragImpulse) * falloff;

            // a tiny attraction ripple as well
            o.vx += (ax * attractImpulse) * falloff * 0.5;
            o.vy += (ay * attractImpulse) * falloff * 0.5;
          }
        });
      }

      // ---- integrate ----
      for (const s of states) {
        const sp = Math.hypot(s.vx, s.vy);
        if (sp > maxSpeed) {
          s.vx = (s.vx / sp) * maxSpeed;
          s.vy = (s.vy / sp) * maxSpeed;
        }

        s.x += s.vx * dt * 60;
        s.y += s.vy * dt * 60;

        s.vx *= friction;
        s.vy *= friction;

        // edges (consider float offset)
        const left = s.baseX + s.x + s.floatX;
        const top = s.baseY + s.y + s.floatY;
        const right = left + s.w;
        const bottom = top + s.h;

        if (left < margin) { s.x += (margin - left); s.vx *= -edgeBounce; }
        if (top < margin) { s.y += (margin - top); s.vy *= -edgeBounce; }
        if (right > vw - margin) { s.x -= (right - (vw - margin)); s.vx *= -edgeBounce; }
        if (bottom > vh - margin) { s.y -= (bottom - (vh - margin)); s.vy *= -edgeBounce; }
      }

      // ---- collision: keep overlap <= 1/3, with soft bounce ----
      for (let i = 0; i < states.length; i++) {
        for (let j = i + 1; j < states.length; j++) {
          const a = states[i], b = states[j];

          const ax1 = a.baseX + a.x + a.floatX, ay1 = a.baseY + a.y + a.floatY;
          const ax2 = ax1 + a.w,              ay2 = ay1 + a.h;
          const bx1 = b.baseX + b.x + b.floatX, by1 = b.baseY + b.y + b.floatY;
          const bx2 = bx1 + b.w,               by2 = by1 + b.h;

          const ix = Math.max(0, Math.min(ax2, bx2) - Math.max(ax1, bx1));
          const iy = Math.max(0, Math.min(ay2, by2) - Math.max(ay1, by1));
          if (ix <= 0 || iy <= 0) continue;

          const interArea = ix * iy;
          const minArea = Math.min(a.w * a.h, b.w * b.h);
          const ratio = interArea / (minArea || 1);

          if (ratio > overlapLimit) {
            // push direction between centers
            const acx = ax1 + a.w/2, acy = ay1 + a.h/2;
            const bcx = bx1 + b.w/2, bcy = by1 + b.h/2;

            let dx = bcx - acx;
            let dy = bcy - acy;
            const d = Math.hypot(dx, dy) || 1;
            dx /= d; dy /= d;

            const strength = (ratio - overlapLimit) * 1200;

            a.vx -= dx * strength * repel;
            a.vy -= dy * strength * repel;
            b.vx += dx * strength * repel;
            b.vy += dy * strength * repel;

            const push = (ratio - overlapLimit) * pushOut;
            a.x -= dx * push;
            a.y -= dy * push;
            b.x += dx * push;
            b.y += dy * push;
          }
        }
      }

      // ---- render ----
      for (const s of states) {
        const tx = s.x + s.floatX;
        const ty = s.y + s.floatY;
        s.el.style.transform = `translate(${tx.toFixed(2)}px, ${ty.toFixed(2)}px)`;
      }
    }

    requestAnimationFrame(step);
    posterInited = true;
  }

  // default landing
  goTo('landing');
})();
</script>

</body>
</html>
